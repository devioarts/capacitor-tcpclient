name: Feature request
description: Suggest an improvement or new capability.
title: "feat: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. For TCP features, protocol and platform details are especially helpful.

  - type: dropdown
    id: platform
    attributes:
      label: Platform
      description: Which platform(s) would this affect?
      multiple: true
      options:
        - Android
        - iOS
        - Electron
        - Web stub
        - TypeScript API
        - Documentation
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to build, and what is missing today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe the API, behavior, or documentation change you would like.
    validations:
      required: true

  - type: textarea
    id: protocol
    attributes:
      label: Protocol or device context
      description: If this relates to a TCP device/protocol, describe message framing, streaming needs, timeouts, and platform differences.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What workarounds have you tried?

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I can help test this on at least one affected platform.
        - label: I am willing to open a pull request for this.
